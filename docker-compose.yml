version: "3.8"

# Development-only compose file.
# This profile bind-mounts the repository and keeps the runtime paper-safe by default.
services:
  api:
    build: .
    command: ["python", "scripts/run_paper_api.py", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      APP_ENV: development
      BROKER_MODE: paper
      TRADING_ENABLED: "false"
      AUTO_TRADE_ENABLED: "false"
      LIVE_TRADING_ENABLED: "false"
      DISCORD_NOTIFICATIONS_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
